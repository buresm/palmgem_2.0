# ---------------------------------------------------------------------------
# DEVELOPER attribute requirement spec (not for end users).
#
# For each input table, declares which STANDARD attributes (see
# default_attribute_mapping.yaml) are:
#   necessary -> if absent after renaming, the import ABORTS (hard error)
#   optional  -> if absent after renaming, the import logs a WARNING and continues
#
# The check runs only for tables that are actually imported, so level-of-detail
# tables that are simply not present never trigger a failure. Tables are sorted
# by name. Source of truth: docs/lod2.md (landcover / walls / roofs) and
# docs/tree.md (trees).
#
# NOTE for maintainers: the per-table split below is the current best mapping
# from the docs; adjust as the input data conventions evolve. `catlandd`/
# `catlandu` and the requiredness of roof `thickness` are not pinned down in the
# docs and are treated as optional for now. surface_params lookup columns
# (emissivity, albedo, roughness, ...) are user-provided in that table with a
# fixed schema and are intentionally NOT part of per-table renaming.
# ---------------------------------------------------------------------------
attribute_spec:

    landcover:
        necessary: [catland]
        optional:  [catlandd, catlandu]

    roofs:
        necessary: []
        optional:  [thickness]

    trees:
        necessary: [treeh]
        optional:  [trunkh, trunkr, crownr, crownshp, tree_type]

    walls:
        necessary: [wallcatd, wallcatu]
        optional:  [albedod, albedou, wallfracd, wallfracu, winfracd, winfracu]
