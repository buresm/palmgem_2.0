# Urban Surface Model (USM) parameters — building and wall physics
# Note: YAML anchors from default_lsm_config.yaml are not cross-file;
# anchor values are inlined here as literals.
# zwall_norm: [0.0242, 0.0969, 0.346, 1.0] | wintrans: 0.8
# indoor_temp: 297 | outdoor_temp: 295 | ground_floor_height: 3

# Surface physical parameters (LOD2). A material-properties lookup table keyed
# by integer `code` (referenced from landcover `catland` and wall/roof category
# columns). Shipped as a CSV so it stays compact and spreadsheet-editable; the
# `initialize_domain` task reads it and builds the PostGIS `surface_params`
# table in the case schema. LOD2 surface params are only applied when the input
# landcover carries a `catland` column. Point this at your own CSV (absolute, or
# relative to the config/ directory) to override the defaults. See docs/lod2.md.
surface_params_file: 'surface_params.csv'

walls:
    # wall directions (North, East, South, West) direction = [1, 2, 3, 4]
    wall_directions: [ [ 0,1 ],[ 1,0 ],[ 0,-1 ],[ -1,0 ] ]
    # wall azimuth (North, East, South, West)
    wall_azimuth: [ 0, 90, 180, 270 ]
    # roof directions (Up, Down) direction = [0, 5]
    roof_directions: [ 1, -1 ]
    # roof zenith (Up, Down)
    roof_zenith: [ 0, 180 ]

# treat insulated walls
insulation:
    enabled: False
    fields: ['zatepd', 'zateph']
    building_pars: [6, 7, 9, 10, 26, 27, 29, 30]
    pars_fields: [1, 1, 1, 1, 0, 0, 0, 0]
    pars_items: [0, 0, 1, 1, 0, 0, 1, 1]
    building_surface_pars: [5, 6, 8, 9]
    surface_pars_items: [0, 0, 1, 1]
    values: [39000, 0.035, 30]

