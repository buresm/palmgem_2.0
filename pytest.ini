[pytest]
# 1. Define where pytest should look for tests
testpaths = tests

# 2. Add root to path for "from src import..."
pythonpath = .

# 3. Define custom markers
markers =
    slow: marks tests as slow
    integration: marks tests that require database/files

# 4. Global options
# --tb=short: cleaner tracebacks
# --strict-markers: prevents typos in marker names
addopts =
    -v
    --tb=short
    --strict-markers

# 5. Retention policy (New!)
# If a test fails, keep the tmp_path folder for 3 runs so you can inspect the output
tmp_path_retention_count = 3
tmp_path_retention_policy = failed

# 6. Ignore specific directories
norecursedirs = .venv .git dist build